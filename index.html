<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>無名牛排 POS 系統 V6.5.24</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Noto Sans TC', system-ui, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 登入畫面 */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f172a, #1e3a5f);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        .login-box {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 340px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .login-icon {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }
        
        .login-title {
            font-size: 1.6rem;
            font-weight: 900;
            color: #1e293b;
            margin-bottom: 5px;
        }
        
        .login-subtitle {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        
        .login-error {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 15px;
            display: none;
        }
        
        .login-input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        
        .login-input:focus {
            outline: none;
            border-color: #4f46e5;
        }
        
        .login-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .login-button:hover {
            opacity: 0.9;
        }
        
        .login-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 主要內容 */
        #main-content {
            display: none;
        }
        
        /* 頂部導航 */
        .header {
            background: white;
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .username {
            color: #1e293b;
            font-weight: 600;
        }
        
        .role-badge {
            background: #e0e7ff;
            color: #4f46e5;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .logout-btn {
            background: none;
            border: 2px solid #e2e8f0;
            padding: 8px 16px;
            border-radius: 10px;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .logout-btn:hover {
            border-color: #dc2626;
            color: #dc2626;
        }
        
        /* 熱銷排行 */
        .hot-sales {
            background: white;
            border-radius: 20px;
            padding: 15px 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 20px;
            overflow-x: auto;
            white-space: nowrap;
        }
        
        .hot-title {
            background: #fee2e2;
            color: #dc2626;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
        }
        
        .hot-items {
            display: flex;
            gap: 20px;
        }
        
        .hot-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .hot-rank {
            background: #f1f5f9;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: #475569;
        }
        
        .hot-rank.gold { background: #fef3c7; color: #d97706; }
        .hot-rank.silver { background: #f1f5f9; color: #64748b; }
        .hot-rank.bronze { background: #fed7aa; color: #b45309; }
        
        /* 分類標籤 */
        .categories {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            overflow-x: auto;
            padding: 5px 0;
        }
        
        .category-tab {
            background: white;
            border: 2px solid #e2e8f0;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .category-tab.active {
            background: #4f46e5;
            border-color: #4f46e5;
            color: white;
        }
        
        /* 菜單網格 */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .menu-item {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            cursor: pointer;
        }
        
        .menu-item:hover {
            transform: translateY(-5px);
        }
        
        .menu-category {
            color: #4f46e5;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        
        .menu-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }
        
        .menu-description {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        
        .menu-price {
            font-size: 1.4rem;
            font-weight: 800;
            color: #4f46e5;
        }
        
        .menu-price small {
            font-size: 0.8rem;
            font-weight: 400;
            color: #94a3b8;
        }
        
        /* 載入中 */
        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.2rem;
        }
        
        .loading-spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 管理後台按鈕 */
        .admin-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
        }
        
        .admin-btn {
            background: #1e293b;
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 25px;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        
        .admin-btn:hover {
            transform: scale(1.1);
        }
        
        /* 手機優化 */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .header { flex-direction: column; gap: 15px; }
            .hot-sales { flex-direction: column; align-items: flex-start; }
            .menu-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- 登入畫面 -->
    <div id="login-screen">
        <div class="login-box">
            <div class="login-icon">🥩</div>
            <h2 class="login-title">tmenu POS</h2>
            <p class="login-subtitle">請登入以繼續</p>
            <div id="login-error" class="login-error"></div>
            <input type="text" id="username" class="login-input" placeholder="帳號" autocomplete="off">
            <input type="password" id="password" class="login-input" placeholder="密碼">
            <button id="login-btn" class="login-button" onclick="doLogin()">登入</button>
        </div>
    </div>

    <!-- 主要內容 -->
    <div id="main-content">
        <div class="container">
            <!-- 頂部導航 -->
            <div class="header">
                <div class="logo" onclick="showAdminPanel()">🥩 無名牛排</div>
                <div class="user-info">
                    <span class="username" id="display-username"></span>
                    <span class="role-badge" id="display-role"></span>
                    <button class="logout-btn" onclick="logout()">登出</button>
                </div>
            </div>

            <!-- 熱銷排行 -->
            <div class="hot-sales">
                <span class="hot-title">🏆 熱銷排行</span>
                <div class="hot-items" id="hot-sales-list">
                    <!-- 由 JavaScript 動態產生 -->
                </div>
            </div>

            <!-- 分類標籤 -->
            <div class="categories" id="category-tabs">
                <!-- 由 JavaScript 動態產生 -->
            </div>

            <!-- 菜單網格 -->
            <div class="menu-grid" id="menu-grid">
                <!-- 由 JavaScript 動態產生 -->
            </div>
            
            <!-- 載入中動畫 -->
            <div id="loading" class="loading" style="display: none;">
                <div class="loading-spinner"></div>
                載入菜單中...
            </div>
        </div>
    </div>

    <!-- 管理後台按鈕 (點擊左上角 logo 顯示) -->
    <div class="admin-panel">
        <button class="admin-btn" onclick="openAdminPanel()">⚙️</button>
    </div>

    <script>
        // ==================== 設定 ====================
        const WORKER_URL = 'https://tmenu-server.toastit2016.workers.dev';
        const TOKEN_KEY = 'tmenu_token';
        const USER_KEY = 'tmenu_user';

        // ==================== API 呼叫 ====================
        async function callWorker(path, data, token = null) {
            try {
                const headers = { 'Content-Type': 'application/json' };
                if (token) headers['X-Auth-Token'] = token;
                
                const response = await fetch(WORKER_URL + path, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(data || {})
                });
                return await response.json();
            } catch (e) {
                console.error('[API Error]', e);
                return { ok: false, error: e.message };
            }
        }

        // ==================== 登入功能 ====================
        window.doLogin = async function() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const loginBtn = document.getElementById('login-btn');
            const errorDiv = document.getElementById('login-error');
            
            if (!username || !password) {
                showLoginError('請輸入帳號和密碼');
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.textContent = '登入中...';
            errorDiv.style.display = 'none';
            
            const result = await callWorker('/api/auth/login', { username, password });
            
            if (result.ok && result.token) {
                // 儲存 token 和使用者資訊
                localStorage.setItem(TOKEN_KEY, result.token);
                localStorage.setItem(USER_KEY, JSON.stringify({
                    username: result.username,
                    role: result.role,
                    store: result.store
                }));
                
                // 隱藏登入畫面，顯示主要內容
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                
                // 更新使用者資訊
                document.getElementById('display-username').textContent = result.username;
                document.getElementById('display-role').textContent = 
                    result.role === 'admin' ? '管理員' : '店員';
                
                // 載入菜單
                loadMenu();
            } else {
                showLoginError(result.error || '登入失敗，請檢查帳號密碼');
                loginBtn.disabled = false;
                loginBtn.textContent = '登入';
            }
        };

        function showLoginError(message) {
            const errorDiv = document.getElementById('login-error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // ==================== 登出 ====================
        window.logout = async function() {
            const token = localStorage.getItem(TOKEN_KEY);
            if (token) {
                await callWorker('/api/auth/logout', {}, token);
            }
            localStorage.removeItem(TOKEN_KEY);
            localStorage.removeItem(USER_KEY);
            
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('login-btn').disabled = false;
            document.getElementById('login-btn').textContent = '登入';
        };

        // ==================== 驗證 token ====================
        async function verifyToken() {
            const token = localStorage.getItem(TOKEN_KEY);
            if (!token) {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('main-content').style.display = 'none';
                return false;
            }
            
            const result = await callWorker('/api/auth/verify', {}, token);
            if (result.ok) {
                // 更新使用者資訊
                document.getElementById('display-username').textContent = result.username;
                document.getElementById('display-role').textContent = 
                    result.role === 'admin' ? '管理員' : '店員';
                
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                return true;
            } else {
                localStorage.removeItem(TOKEN_KEY);
                localStorage.removeItem(USER_KEY);
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('main-content').style.display = 'none';
                return false;
            }
        }

        // ==================== 載入菜單 ====================
        let menuData = { menu: [], addons: [], options: [] };
        
        async function loadMenu() {
            const loading = document.getElementById('loading');
            const menuGrid = document.getElementById('menu-grid');
            
            loading.style.display = 'block';
            menuGrid.innerHTML = '';
            
            try {
                // 從 Worker 讀取菜單
                const response = await fetch(WORKER_URL + '/api/config/get');
                const data = await response.json();
                
                if (data.ok && data.menu) {
                    menuData = data;
                    renderMenu(data.menu);
                    renderCategories(data.menu);
                    renderHotSales(data.menu);
                } else {
                    menuGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: white;">無法載入菜單</div>';
                }
            } catch (e) {
                console.error('載入菜單失敗:', e);
                menuGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: white;">載入失敗，請稍後再試</div>';
            } finally {
                loading.style.display = 'none';
            }
        }

        // ==================== 渲染菜單 ====================
        let currentCategory = '全部';
        
        function renderMenu(menu) {
            const menuGrid = document.getElementById('menu-grid');
            const filteredMenu = currentCategory === '全部' 
                ? menu 
                : menu.filter(item => item.category === currentCategory);
            
            if (filteredMenu.length === 0) {
                menuGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: white;">此分類暫無項目</div>';
                return;
            }
            
            menuGrid.innerHTML = filteredMenu.map(item => `
                <div class="menu-item" onclick="selectItem('${item.id}')">
                    <div class="menu-category">${item.category || '一般'}</div>
                    <div class="menu-name">${item.name}</div>
                    <div class="menu-description">${item.description || ''}</div>
                    <div class="menu-price">$${item.price} <small>+5%稅</small></div>
                </div>
            `).join('');
        }

        // ==================== 渲染分類標籤 ====================
        function renderCategories(menu) {
            const categories = ['全部', ...new Set(menu.map(item => item.category).filter(Boolean))];
            const tabs = document.getElementById('category-tabs');
            
            tabs.innerHTML = categories.map(cat => `
                <div class="category-tab ${cat === currentCategory ? 'active' : ''}" 
                     onclick="switchCategory('${cat}')">
                    ${cat}
                </div>
            `).join('');
        }

        // ==================== 切換分類 ====================
        window.switchCategory = function(category) {
            currentCategory = category;
            renderMenu(menuData.menu);
            renderCategories(menuData.menu);
        };

        // ==================== 渲染熱銷排行 ====================
        function renderHotSales(menu) {
            // 這裡可以根據實際銷售數據排序，目前先用固定順序
            const hotItems = menu.slice(0, 5).map((item, index) => ({
                ...item,
                rank: index + 1
            }));
            
            const hotList = document.getElementById('hot-sales-list');
            hotList.innerHTML = hotItems.map(item => `
                <div class="hot-item">
                    <span class="hot-rank ${getRankClass(item.rank)}">${item.rank}</span>
                    <span>${item.name}</span>
                </div>
            `).join('');
        }

        function getRankClass(rank) {
            if (rank === 1) return 'gold';
            if (rank === 2) return 'silver';
            if (rank === 3) return 'bronze';
            return '';
        }

        // ==================== 選擇餐點 ====================
        window.selectItem = function(itemId) {
            const item = menuData.menu.find(i => i.id === itemId);
            if (item) {
                alert(`選擇：${item.name}\n價格：$${item.price}`);
                // 這裡可以加入購物車邏輯
            }
        };

        // ==================== 管理後台 ====================
        window.showAdminPanel = function() {
            const user = JSON.parse(localStorage.getItem(USER_KEY) || '{}');
            if (user.role === 'admin') {
                window.open('https://dash.cloudflare.com', '_blank');
            } else {
                alert('只有管理員可以訪問後台');
            }
        };

        window.openAdminPanel = window.showAdminPanel;

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', async () => {
            // 檢查是否已登入
            const isValid = await verifyToken();
            if (isValid) {
                await loadMenu();
            }
            
            // 綁定 Enter 鍵
            document.getElementById('password').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') doLogin();
            });
        });

        // ==================== 自動備份 ====================
        setInterval(async () => {
            const token = localStorage.getItem(TOKEN_KEY);
            if (!token) return;
            
            try {
                const backup = {};
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    backup[key] = localStorage.getItem(key);
                }
                
                await callWorker('/api/backup', { data: backup }, token);
                console.log('[備份] 自動備份完成');
            } catch (e) {
                console.error('[備份] 失敗', e);
            }
        }, 10 * 60 * 1000); // 每10分鐘
    </script>
</body>
</html>
