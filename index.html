<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>無名牛排 POS 系統 V6.5.24</title>
    <!-- Tailwind CSS CDN -->
    <!-- 注意：Console 中的 Tailwind 警告是正常的，不影響功能 -->
    <!-- 這是單文件應用，使用 CDN 是最方便的方式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React 和 ReactDOM -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    
    <style>
        /* 完全隱藏右側感應區塊和所有視覺元素 */
        .hide-right-stealth-trigger {
            display: none !important;
        }

        /* 自定義滾動條 */
        .custom-scrollbar::-webkit-scrollbar { width: 12px; height: 12px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 100px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 100px; border: 3px solid #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #6366f1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* 前台主捲動區域：完全隱藏滾動條 */
        #front-main-scroll::-webkit-scrollbar { display: none !important; width: 0 !important; }
        #front-main-scroll { -ms-overflow-style: none !important; scrollbar-width: none !important; }
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fade-in 0.5s ease-out; }
        @keyframes slow-zoom { 0% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .animate-slow-zoom { animation: slow-zoom 15s ease-out forwards; }
        @media print {
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            #root { display: none !important; }
            #print-container { display: block !important; position: fixed; top: 0; left: 0; width: 100%; }
            @page { margin: 2mm; size: 58mm auto; }
        }
        .glass-effect { background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.18); }

        /* 確保編輯模態框能完全覆蓋整個視口 */
        .z-\[99999\] {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            bottom: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 999999 !important;
        }

        @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        
        /* 自動跳轉高亮動畫 */
        @keyframes highlight-pulse {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); }
            50% { box-shadow: 0 0 0 15px rgba(99, 102, 241, 0.3); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }
        .auto-jump-highlight {
            animation: highlight-pulse 1s ease-out;
        }

        /* ===== RWD 自適應 - 改進版 ===== */
        :root { 
            font-size: clamp(9.6px, 1.2vw, 14.4px);
        }
        html, body { height: 100%; overflow: hidden; }
        #root { height: 100%; overflow: hidden; display: flex; flex-direction: column; }

        /* 滑鼠滾輪控制 main 滾動 */
        main.wheel-scroll-target {
            scroll-behavior: smooth;
        }

        /* 中等螢幕調整 */
        @media (max-width: 1024px) {
            :root { font-size: clamp(8.8px, 1.44vw, 13.6px); }
        }
        
        /* 小螢幕縮放調整 */
        @media (max-width: 768px) {
            :root { font-size: clamp(8px, 1.76vw, 12.8px); }
        }
        
        /* 極小螢幕 */
        @media (max-width: 480px) {
            :root { font-size: clamp(7.2px, 2.24vw, 11.2px); }
        }
        
        /* 大螢幕優化 */
        @media (min-width: 1920px) {
            :root { font-size: clamp(11.2px, 0.96vw, 16px); }
        }
        
        /* 確保按鈕文字不換行 */
        .whitespace-nowrap {
            white-space: nowrap !important;
        }
        
        /* 底部導航欄響應式調整 */
        @media (max-width: 1280px) {
            .bottom-nav-container {
                padding: 1.5rem !important;
            }
        }
        
        @media (max-width: 1024px) {
            .bottom-nav-container {
                padding: 1rem !important;
            }
        }
        
        /* 選項網格響應式調整 */
        @media (max-width: 1280px) {
            .options-grid {
                gap: 1.5rem !important;
            }
        }
        
        @media (max-width: 1024px) {
            .options-grid {
                gap: 1rem !important;
            }
        }
        
        @media (max-width: 768px) {
            .options-grid {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>
<body class="bg-slate-100 font-sans antialiased">
    <div id="root"></div>
    <div id="print-container" style="display:none"></div>
    <script src="https://raw.githubusercontent.com/beefsteak5172/ai/main/app.js?v=dcbbebbb"></script>
<script>
// Worker API - KV sync + background backup
var WU='https://tmenu-server.toastit2016.workers.dev';
var _kvLoaded=false;

async function cw(path,data){
  try{
    var r=await fetch(WU+path,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(data||{})
    });
    return await r.json();
  }catch(e){return{ok:false,error:e.message};}
}

// 從 KV 載入菜單，若有新資料則更新 localStorage 並回傳 true
// 圖片(base64)太大不存 localStorage，改存在記憶體變數供 App 直接使用
window._kvImages={};

function stripImages(menu){
  // 移除 base64 圖片，改存到記憶體，localStorage 只存文字資料
  if(!Array.isArray(menu))return menu;
  return menu.map(function(cat){
    var c=JSON.parse(JSON.stringify(cat));
    if(c.items&&Array.isArray(c.items)){
      c.items=c.items.map(function(item){
        var it=JSON.parse(JSON.stringify(item));
        if(it.image&&it.image.length>500){
          window._kvImages[it.id]=it.image;
          it.image='__KV__';
        }
        return it;
      });
    }
    return c;
  });
}

function restoreImages(menu){
  if(!Array.isArray(menu))return menu;
  return menu.map(function(cat){
    if(cat.items&&Array.isArray(cat.items)){
      cat.items=cat.items.map(function(item){
        if(item.image==='__KV__'&&window._kvImages[item.id]){
          item.image=window._kvImages[item.id];
        }
        return item;
      });
    }
    return cat;
  });
}

async function loadConfigFromKV(){
  try{
    var r=await fetch(WU+'/api/config/get',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    var data=await r.json();
    if(data.ok){
      var changed=false;
      if(data.menu&&data.menu.length>0){
        // 先把圖片存到記憶體，再把無圖版存 localStorage
        var menuNoImg=stripImages(data.menu);
        var newVal=JSON.stringify(menuNoImg);
        try{
          if(localStorage.getItem('menuConfig')!==newVal){localStorage.setItem('menuConfig',newVal);changed=true;}
        }catch(qe){
          // quota exceeded: 清掉舊資料再試
          try{localStorage.removeItem('menuConfig');localStorage.setItem('menuConfig',newVal);changed=true;}
          catch(qe2){console.warn('[Worker] localStorage full, using memory only');changed=true;}
        }
      }
      if(data.addons&&data.addons.length>0){
        var newVal=JSON.stringify(data.addons);
        try{
          if(localStorage.getItem('addonsConfig')!==newVal){localStorage.setItem('addonsConfig',newVal);changed=true;}
        }catch(qe){try{localStorage.removeItem('addonsConfig');localStorage.setItem('addonsConfig',newVal);}catch(e){}}
      }
      if(data.options&&data.options.length>0){
        var newVal=JSON.stringify(data.options);
        try{
          if(localStorage.getItem('optionsConfig')!==newVal){localStorage.setItem('optionsConfig',newVal);changed=true;}
        }catch(qe){try{localStorage.removeItem('optionsConfig');localStorage.setItem('optionsConfig',newVal);}catch(e){}}
      }
      // 把完整含圖片的菜單存在記憶體，供 App 直接取用
      window._kvMenuFull=data.menu;
      window._kvAddonsFull=data.addons;
      window._kvOptionsFull=data.options;
      if(changed){console.log('[Worker] Config updated from KV');}
      else{console.log('[Worker] Config unchanged, images in memory');}
      return changed;
    }else{
      console.warn('[Worker] No config in KV, using localStorage');
      return false;
    }
  }catch(e){
    console.warn('[Worker] KV load failed, using localStorage:', e.message);
    return false;
  }
}

// idb + IndexedDB 寫入在 DOMContentLoaded 後執行（見下方）

document.addEventListener('DOMContentLoaded',function(){
  setTimeout(function(){
    if(typeof apiService==='undefined'||typeof idb==='undefined'||typeof STORES==='undefined'){
      console.warn('[Worker] apiService or idb not found');
      return;
    }

    // patch apiService methods for KV sync
    var os=apiService.submitOrder.bind(apiService);
    var ou=apiService.updateOrderStatus.bind(apiService);
    var om=apiService.saveMenuConfig.bind(apiService);

    apiService.submitOrder=async function(d){
      var r=await os(d);
      cw('/api/order',{action:'submit',order:d});
      return r;
    };
    apiService.updateOrderStatus=async function(id,s){
      var r=await ou(id,s);
      cw('/api/order',{action:'updateStatus',id:id,status:s});
      return r;
    };
    apiService.saveMenuConfig=async function(m,a,o,mt){
      var r=await om(m,a,o,mt);
      cw('/api/config',{action:'saveMenu',menu:m,addons:a,options:o});
      return r;
    };

    console.log('[Worker] apiService patched - backup enabled');

    // 從 KV 載入菜單，直接寫入 IndexedDB，再觸發 App 重新初始化
    loadConfigFromKV().then(function(){
      if(!window._kvMenuFull||window._kvMenuFull.length===0){
        console.warn('[Worker] No KV menu data, keeping current');
        return;
      }
      var writes=[];
      writes.push(idb.set(STORES.MENU,'current',window._kvMenuFull));
      if(window._kvAddonsFull&&window._kvAddonsFull.length>0)
        writes.push(idb.set(STORES.ADDONS,'current',window._kvAddonsFull));
      if(window._kvOptionsFull&&window._kvOptionsFull.length>0)
        writes.push(idb.set(STORES.OPTIONS,'current',window._kvOptionsFull));
      Promise.all(writes).then(function(){
        apiService.init().then(function(){
          console.log('[Worker] KV menu written to IndexedDB, App refreshed');
        });
      }).catch(function(e){
        console.warn('[Worker] IndexedDB write failed:',e.message);
      });
    });

    // Auto-backup every 10 minutes (from IndexedDB)
    setInterval(function(){
      try{
        apiService.getRawConfig().then(function(cfg){
          cw('/api/backup',{data:{menu:cfg.menu,addons:cfg.addons,options:cfg.options}});
          console.log('[Worker] Auto-backup sent');
        });
      }catch(e){}
    },10*60*1000);

    // 每2分鐘從 KV 輪詢最新菜單，若有更新則自動同步到 IndexedDB
    // 確保所有裝置都能即時看到最新菜單
    var _lastMenuHash='';
    function pollKVMenu(){
      fetch(WU+'/api/config/get',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'})
        .then(function(r){return r.json();})
        .then(function(data){
          if(!data.ok||!data.menu||data.menu.length===0)return;
          // 用菜單長度+第一項名稱做簡易 hash 判斷是否有變化
          var hash=data.menu.length+'|'+(data.menu[0]&&data.menu[0].title||'')+'|'+
                   (data.menu[0]&&data.menu[0].items&&data.menu[0].items.length||0);
          if(hash===_lastMenuHash){
            console.log('[Worker] Poll: menu unchanged');
            return;
          }
          _lastMenuHash=hash;
          // 有變化，寫入 IndexedDB 並重新初始化
          var writes=[];
          writes.push(idb.set(STORES.MENU,'current',data.menu));
          if(data.addons&&data.addons.length>0)
            writes.push(idb.set(STORES.ADDONS,'current',data.addons));
          if(data.options&&data.options.length>0)
            writes.push(idb.set(STORES.OPTIONS,'current',data.options));
          Promise.all(writes).then(function(){
            apiService.init().then(function(){
              console.log('[Worker] Poll: menu updated from KV');
            });
          });
        })
        .catch(function(e){console.warn('[Worker] Poll failed:',e.message);});
    }
    // 啟動後先記錄初始 hash，之後每2分鐘輪詢
    apiService.getRawConfig().then(function(cfg){
      if(cfg.menu&&cfg.menu.length>0){
        _lastMenuHash=cfg.menu.length+'|'+(cfg.menu[0]&&cfg.menu[0].title||'')+'|'+
                      (cfg.menu[0]&&cfg.menu[0].items&&cfg.menu[0].items.length||0);
      }
    });
    setInterval(pollKVMenu, 2*60*1000);
    console.log('[Worker] KV polling every 2 min enabled');

  },500);
});
</script>
</body>
</html>
